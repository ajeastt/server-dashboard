services:
  server-dashboard:
    build: .
    container_name: server-dashboard
    ports:
      - "${SERVERDASH_PORT:-3001}:3001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /opt/stacks:/opt/stacks:ro
      - /opt/dockge:/opt/dockge:ro
      - /opt/server-dashboard:/opt/server-dashboard:ro
      - type: bind
        source: /
        target: /host
        read_only: true
        bind:
          propagation: rslave
    restart: unless-stopped
    environment:
      - PORT=3001
