services:
  server-dashboard:
    image: ghcr.io/ajeastt/server-dashboard:latest
    pull_policy: always
    container_name: server-dashboard
    ports:
      - "${SERVERDASH_PORT:-3001}:3001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /opt/stacks:/opt/stacks:rw
      - type: bind
        source: /
        target: /host
        read_only: true
        bind:
          propagation: rslave
    privileged: true
    restart: unless-stopped
    environment:
      - PORT=3001
